body:
  text: 下卷産後總論凡病起於血氣之衰脾胃之虛況産婦氣血脾胃之虛弱殆有甚焉丹溪論産後當以大補氣血為主雖有他症以末治之故治法有氣毋專耗氣有食毋專消食熱不用芩連寒不用附桂如中虛外感見三陽表證之多似可汗也在産後而用麻黃則重傷其陽見三陰里症之多似宜下也在産後而用承氣則重亡其陰至若耳聾脅痛腎虛惡露之停休用柴胡譫語汗出中風惡寒之症莫作風治其由陽氣之衰非大補不能回陽而起弱即如因陰血之涸非滋補不能舒筋而活絡又乍寒乍熱發作有期症類瘧也若以瘧治淹滯難痊神不守舍言語無倫病似邪也若以邪治危亡可待去血而大便閉結蓯蓉加於生化汗多而小便短澀六君倍用參耆肛脫茄症俱是氣虛下陷補中益氣是良方也口禁拳握無非血燥類風加參生化十有益焉産戶入風服以養榮羌獨玉門傷冷洗須床兔萸硫怔忡驚悸生化湯加以遠志似邪恍惚安神丸兼服脾氣因喘咳而滿悶虛煩生化湯加木香為佐因過食而嘔吐厄逆六君子加神麯為良蘇木稜蓬大能破血青皮枳實最消膨脹一應耗氣破血之藥汗出泄下之方只可施於強壯不宜用於虛弱大抵新産之後先問惡露何如塊痛何如參朮不可遽加至若亡陽汗脫氣虛喘促加參生化是從權也如亡陰太熱暈厥血崩升舉大補乃急救耳王太僕云治下補下制以緩急制緩以滋道路制急乃氣味俱薄力與緩同是治法當遵丹溪服法須效太僕雖未盡産症之詳已統括治療之要敢曰濟陰之指南其於女科不無小補云生化湯論産後氣血太虛理宜大補但惡露未盡用補須防滯血乃生之而且化之能化能生攻血塊無損元氣行中又帶補血方許萬全治無一失世以四物湯治産地黃性寒滯血芍藥酸寒無補其不誤人者幾希矣按生化湯者因藥性之功而立名也蓋産後以化舊生新為要考諸藥性川芎當歸桃仁三品能破舊血驟生新血佐以薑炭炙甘引三品入於肺肝生血理氣五味成方行中有補化中有生實産後之聖藥也故因以生化名之凡孕婦至月足照方預備數帖至胞水一破速煎一劑候兒下地即服不問半産正産雖少壯婦女平安無事俱宜服之惡露産後惡露有塊名曰兒枕世多先消後補殊不知舊血雖當消化新血亦宜生養若專攻舊則新亦不寧矣世以濟坤丹攻血塊下胞胎者一時雖見速效而元氣未免虧損不得已而用之只可一丸不宜多服且須隨進補劑庶免虛弱之害生化湯當歸八錢川芎四錢桃仁十粒薑炭五分炙草五分上用水三鍾煎八分加酒七八匙稍熱服渣留後帖同煎要在産後一二個時辰內未進飲食之先相繼而服則下焦血塊速化新血驟生自免血暈等症但此湯頻服精神漸增産後諸症不能乘虛而襲矣其或勞甚血崩形脫喘汗不止急進加參生化湯數帖或一方內加紅花五分元胡醋炒一錢五分或方內再加桂心七分加參生化湯人參二錢川芎二錢當歸四錢薑炭四分桃仁十粒棗三枚加減法産後七日內未服生化湯塊痛未除仍照前方服數帖或加元胡益母亦可自然塊消痛止不可遽加參耆白朮補住瘀血禍不可言産後三日內塊痛雖未除其産婦氣血虛脫或崩或厥或汗多而厥或形色脫去口氣漸冷或煩渴不止或氣喘短促無論塊痛從權加參耆以扶危急如體倦無力氣虛短促本方多加人參兼汗加黃耆煩躁加竹茹渴加麥冬五味喘加杏仁桔梗産後大便不通或至八九日者由血少腸燥故也宜生化湯加麻仁三錢蓯蓉五錢以潤之日久自通如虛加人參二錢勿用承氣湯産後七日內或傷寒冷血塊凝結痛甚生化湯加肉桂五分元胡一錢或食冷物連心腹痛者再加吳萸七分産後肥人多痰宜生化湯加花粉竹瀝薑汁或加橘紅四分毋輕用牛黃及寒冷等味産前素虛弱者産後一二日已服生化湯三四帖塊痛稍減可按揉而定宜生化湯加人參三錢産後雖暑月亦要和暖如失蓋衣被腹不溫和風邪乘虛而入雖服生化湯恐塊痛不止宜加肉桂四分五靈脂一錢産後勞倦血暈服生化湯一劑頭煎後再即取一帖加人參一二錢汗多亦加如形不脫去只用鹿角炭二錢本湯送下或益母丸亦可外用細搗韭菜納有嘴瓷瓶內將滾醋兩碗衝入封其大口以小口注産婦鼻中斂其精神即醒産後發熱汗出手足厥冷或血崩氣短神昏氣脫乃大虛症急須大補庶可回生宜加參生化湯速進數劑再以生脈散代茶毋信産室百問及婦人良方等書産後日久不食聞藥即吐須用獨參二三錢或姜少許白米一大撮水煎服以安胃氣如聽其胃虛不能飲食危矣法用胡椒少許人乳燉熱和勻微辣與飲加以獨參湯頻頻進之可效産後用藥十誤産後誤用順氣耗氣藥反增飽悶雖陳皮亦不可多用産後誤用消食藥過多致減食損胃甚至不進食産後誤用芩連知柏致倒胃增熱甚至不食産後塊痛未除誤用參耆白朮輕則瘀血不行重則立斃産後誤用地黃以滯惡露獨用枳殼枳實以消塊痛致耗元氣産後誤用大黃芒硝以通大便必成膨脹産後誤用蘇木三稜莪朮以行塊輕則傷新血重則傷性命産後虛弱之婦誤用山楂煎酒以攻血塊必傷元氣以致汗出不止産後誤用濟坤丹下胞衣至三四五丸以致百病皆作産後誤信産室百問及婦人良方多至不救産後血暈凡分娩之後眼花頭眩不知人事謂之血暈其因有三一因勞倦甚而氣竭神昏二因去血多而元氣欲絶三因痰火乘虛泛上而憒不清患此三者魂不隨神往來而幾運幾息也急服加味生化湯二三帖以行塊停痛外用醋韭法沖鼻使産母聞醋氣令精神斂而不散此治血暈之急法也大約病弱産母臨盆之際須預煎生化湯預備韭醋瓶以防患此為萬全及兒下地不可喜子慢母母亦不宜顧子忘倦又不可産訖即臥與夫憤怒氣逆皆能致暈也慎之慎之加味生化湯川芎三錢當歸六錢薑炭四分桃仁十粒炙草五分荊芥五分水煎八分加酒熱服如汗多加人參二錢黃耆一錢然必塊不痛者方可用痛甚加肉桂五分渴加麥冬一錢五味十粒有痰加竹瀝半杯薑汁一匙痰火乘虛泛上而暈加橘紅四分兩手脈伏或右手脈絶加人參四錢麥冬一錢五味二錢按治血暈切不可用破血耗氣等藥雖山楂性緩亦不宜服其塊痛者生化湯兼送益母丸及鹿角炭倘氣脫將絶牙關緊閉藥不下喉者用鵝羽筒插喉灌之如灌下漸溫暖則不拘帖數灌之又當用熱手單衣外從心揉至腹上又時換熱衣溫暖之自然漸漸蘇醒如醒後塊痛仍未除者宜減去參耆單服生化湯待塊消痛止再服參耆産後厥逆凡産母産時用力過甚勞倦傷脾脾氣耗竭不能注於四肢故足冷逆而厥氣上行經曰陽氣衰於下則為寒厥厥氣上行滿於經絡則神氣浮越去身而飄散矣苟非大補焉能回陽而復神必用加參生化湯倍人參連進二帖使氣血旺而神復厥止如渴另用生脈散代茶助津以滋臟燥雖有四肢厥冷泄漏或類傷寒陰症亦不可四逆湯輩必加參生化佐以黑姜或加熟附一片以回陽止逆則可已足以行參耆之力矣加參生化湯人參二錢川芎二錢當歸四錢薑炭炙草各四分桃仁十粒加元棗二枚水煎如厥回暫去人參待血塊痛除再加此治新産發厥滋榮益氣復神湯産後發厥無塊痛者服此川芎焦術炙耆麥冬各一錢人參當歸各三錢熟地二錢炙草四分陳皮四分五味十粒水煎服口渴以生脈散代茶汗多加麻黃根棗仁各一錢塊痛不止加肉桂五分便閉加蓯蓉麻仁各二錢痰加竹瀝薑汁橘紅各四分酒一杯手足口氣漸冷加附子五分倍用人參按厥逆屬陽虛者居多若無塊痛腹脹等症純用參附加肉桂可也有桂則瘀亦去矣不可遲疑暈厥總論大抵産後暈厥皆由氣血兩竭神將去而幾息僅有一線生意耳若非大補不能回將絶之元陽但暈在臨盆尤甚於厥宜頻服生化湯先補血分之虧可期塊化血旺神清暈止如無汗脫神倦氣促等症切勿遽加參耆或厥在分娩之後氣血兩竭宜用加參生化以復其神總之治暈問有塊痛參朮未可驟進問無塊痛參耆地術必須並用産後血崩産後血水大來須看顏色之紅紫形氣之虛實如形色多紫乃當去之敗血勿以崩論若紅而色鮮乃是驚傷心不能主血怒傷肝而不能藏血勞傷脾而不能攝血當以崩治法宜先服生化湯數帖則行中有補血自生旺矣至若形脫氣促或汗出不止宜服倍參生化以益氣斯陽生則陰長而血乃生旺非棕炭等止血藥可治也如産已滿月外又宜升舉大補湯治之凡年老積弱人患崩均宜服此加參生化湯治産後血崩形脫汗多氣促川芎三錢當歸四錢荊芥四分桃仁十粒人參三錢肉桂五分二帖後去之炙草五分棗二枚水煎熱服汗多加黃耆人參各三錢渴加麥冬五味瀉加茯苓蓮子兩手脈伏或右手脈絶生脈散倍人參痰加竹瀝薑汁酒一杯咳嗽加杏仁知母桔梗各一錢驚悸加棗仁柏仁各二錢久不進食聞藥即吐用獨參二三錢水一杯煎鍋焦末服之引開胃口鮮血來多不止加升麻白芷各五分如無汗脫等症只服生化湯加炒黑荊芥自安世言芎歸活血不可治崩殊誤升舉大補湯治産後日久血崩不止或如雞卵大塊或去血如片宜大補脾胃升提氣血少加鎮墜心火之藥此方並治老少血崩等症人參白朮各三錢川芎一錢當歸一錢五分熟地二錢黃耆一錢白芷四分荊芥四分陳皮黃連黃柏炒瀉者勿用羌活防風各四分升麻甘草各五分渴加麥冬五味瀉加澤瀉蓮子痰加半夏兼白帶者加蒼朮半夏各一錢産後類傷寒三陰症即大便不通産後潮熱有汗大便不通毋專論為陽明症口燥咽乾毋專論為少陰症腹滿溢干大便祕結毋專論為太陰症又汗多譫語勿專論腸胃有燥糞其諸症多由勞倦傷脾運化稍遲氣血枯竭所致治宜養正通幽湯勿執偏門妄用承氣致沾唇莫救按此論更當細玩即書所謂産後以大補氣血為主雖有他症以末治之之意又即甘溫能除大熱之旨也養正通幽湯一名助血潤腸湯川芎二錢五分炙草五分桃仁五粒蓯蓉五錢陳皮四分麻仁三錢水煎溫服諸症加減如前惟汗出譫語便實乃氣血兩虧神衰心主失守急宜養榮安神加茯苓棗仁柏子參耆白朮各一錢水煎服如大便至十日以上燥結不通肛門必有燥糞用蜜煎入皂角末或豬膽汁及枯鹽導之慎勿誤用下藥泄瀉不止或致虛閉以成膨脹為害不淺産訖第一須服生化湯數帖必無血燥腸枯之症産後類傷寒三陽症産後七日內發熱頭疼惡寒勿專論為太陽症發熱頭痛脅疼勿專論為少陽症二症皆由氣血兩虧陰陽不和而類外感切不可用麻黃湯以治太陽類症用柴胡湯以治少陽類症蓋脫血之餘又發汗以重亡其陽是使陰陽兩竭禍不勝言即或症中真感傷寒而加味生化湯內芎姜亦能散寒且榮衛調和諸病自退加味生化湯川芎二錢當歸二錢薑炭五分炙草五分桃仁十粒陳皮三分棗二枚水煎溫服連進二帖如明知感冒風邪二帖不退加羌活四分蔥白二寸産後類中風痙症産後手足搐搦眼目上視角弓反張口眼歪斜舌喑不語痰涎上湧不省人事者皆由風寒入於腠理經絡不和所致與中風相類切不可作風治急須補氣壯陽為主治宜右歸飲加味續命等湯若用風燥藥重耗其血以亡其陽如蘇合丸牛黃丸之類入口即斃加味右歸飲大熟地薑汁炒八錢杞子酒炒三錢淨萸肉酒炒四錢懷山藥四錢澤瀉二錢丹皮酒炒二錢熟附子三錢肉桂心一錢白茯苓三錢鹿角膠三錢巴戟肉三錢炮姜八分煎服加味續命湯人參二錢焦木二錢茯苓二錢炮姜八分熟附子三錢北細辛五分生黃耆三錢防風二錢酒拌炒歸身三錢法夏一錢炙甘草八分杞子三錢鹿膠三錢一方加天竺黃一錢五分石菖蒲米汁浸炒一錢五分煎服白通加豬膽汁湯熟附子二錢乾薑八分焦術二錢茯苓二錢炙草二錢蔥二莖去尖白服時入豬膽汁三匙沖真武湯熟附子三錢乾薑一錢焦木二錢茯苓二錢歸身二錢肉桂一錢炙草八分白芍炒一錢五分加淨棗仁炒二錢煎服黑錫丹用黑錫一兩舶硫磺末一兩和入溶化結成砂研細五錢熟附子五錢肉桂三錢沉香三錢小茴三錢檀香三錢肉果煨三錢陽起石煅五錢蘆巴三錢廣木香煨三錢乾薑一錢白蔻三錢川楝肉五錢紫丁香二錢共為細末米糊為丸梧子大陰乾用青布袋盛擦光如銀亮收貯每用四十九粒或三十二粒淡薑湯下此丹不拘中風痙症痰鳴氣喘皆可服産後癱瘓症凡産後癱瘓類風病者皆因去血過多氣不能生新血以致經絡不調筋骨疼痛甚至半身不遂瘋廢床褥經年不愈手足麻足不仁拘攣不知痛癢若誤認為風症妄用祛風散血燥烈等藥多致不救治宜虎骨鹿茸丸虎骨鹿茸丸虎脛骨一對如無以膠三兩代之用膀十四兩亦可鹿茸羊酥蒸炙一對如無以膠四兩代之枸杞子小茴一兩酒炒三兩菟絲子三兩巴戟肉酒炒三錢刺蒺藜酒炒二兩補骨脂鹽水炒一兩五錢肉桂一兩五錢陳皮一兩威靈仙一兩五錢防風一兩淫羊藿羊油炙三兩杜仲薑汁炒三兩全蠍梢酒洗淡炒三錢歸身酒炒三兩川萆薢一兩鱉甲醋炙二兩共為末各膠溶化再用鹿筋如無牛筋可代一斤燉爛化搗如泥米仁一斤炒研末打稠糊和飴糖三斤溶並各膏和勻搗為丸不拘大小每服五錢燒酒浸紅花蘄艾少許送下忌生冷産後類瘧産後寒熱往來應期而發此由氣血並竭陽虛生外寒陰虛生內熱或晝輕夜重或日晡潮熱一日二三度其症雖似乎瘧而發無常期只須生化湯倍加當歸則身熱自退即或應期而發症與瘧同亦必調和氣血為主無用芩連等治熱及常果檳楂等截瘧如汗多加參耆熱甚倍用當歸川芎若産及一月其人素虛而患瘧用人參養胃湯並服人參白朮膏加減生化湯川芎一錢當歸二錢人參白朮各一錢茯苓八分青皮二分炙甘草三分藿香八分烏梅一枚渴加麥冬一錢五味三分痰加半夏八分竹瀝薑汁汗加黃耆棗仁各一錢傷米食加神麯一錢麥芽五分傷肉食加山楂砂仁各五分人參養胃湯人參白朮當歸各二錢茯苓半夏各八分肉果甘草青皮藿香各四分烏梅二枚人參白朮湯白朮一斤人參一兩水六碗煎去其半如法再煎如此三次去渣取汁共九碗慢火熬至一碗每日服半酒杯白湯下産後疸症黃疸症平人皆有産後更甚多致不救蓋甲乙木屬肝膽乃東方資生之氣膽屬足少陽乃半表半裡之經若外感風寒內束經絡醫治不善寒濕入膽久郁為熱擾害清淨之府逼出膽汁浸淫毛竅化為黃色甚至汗黃眼黃便黃如金汁者甚為費手治宜加減陰膽湯陽虧者加桂附陰虛者加歸身熟地微熱者加丹皮加減陰膽湯人參二錢軟柴胡一錢白芍酒炒八分炙草八分乾薑一錢法夏一錢西黨參薑汁炒三錢飲至十劑自愈忌茵陳清寒等藥無力服參以黃耆一錢代之産後汗出産後汗出不止由勞傷脾驚傷心怒傷肝患此三者不宜即加斂汗之藥但令神寧則汗自止且血塊作痛耆術未可遽加凡産畢有汗先服生化湯兩貼以消塊即繼服調衛止汗湯若倦甚而濈濈然汗出形色俱脫乃亡陽汗脫也難拘常法從權以參耆調衛救急待産母稍有精神又減參耆以除塊痛若汗多而陰竭陽微以致筋脈拘急項強口噤牙噤發搐類傷寒痙症者慎勿作傷寒治宜加味生化湯隨症加減汗雖有自汗盜汗之分治當兼理血分藥品並宜加味生化湯余方但非産後盜汗所宜若服參耆大劑汗多不止及頭面汗出不止腰足青色者不治調衛止汗湯炙耆麻黃根當歸各一錢人參隨症加減防風三分桂枝炙草各五分棗二枚水煎汗多而渴加麥冬五味汗多亡津而小便不利毋用利水等藥産母多痰毋用半夏生薑只可用橘紅四分從權參耆調衛湯人參三錢炙耆麻黃根各一錢五分當歸二錢桂枝五分汗少減之防風三分元棗二枚水煎禁用半夏生薑柴胡芩知柏等味汗出不止真陽已衰衛外之陽不固方內當加附子棗仁炒野朮牡蠣粉炙耆重用為佳加味生化湯川芎二錢當歸六錢人參三錢如虛倍用天麻八分黃耆一錢五分炙草五分荊芥八分棗三枚水煎渴加麥冬五味脈脫加人參三錢附子四分便閉加麻仁三錢痰加竹瀝薑汁忌蔥韭辛熱食物産後氣短髮喘産後血脫勞傷過甚氣無倚仗呼吸止息各違其常氣出短促而喘言語不相接續是血脫氣虛之至速煎生化湯一二帖即加人參二三錢以救急再備醋韭瓶以防暈毋疑參能助喘不用少用以致不救惟一切降氣等藥禁用若虛不受補聞食即吐胃氣將絶不治之症也加味生化湯川芎一錢當歸三錢薑炭五分桃仁十粒人參三錢茯苓一錢汗多勿用炙草五分汗多加黃耆渴加麥冬五味胃虛不食聞藥即吐及食寒藥寒物嘔不納穀用獨參三四錢生薑三片秈米一撮續氣養榮湯川芎二錢當歸四錢炙草炮姜各五分人參二錢黃耆一錢熟地棗仁山藥各一錢陳皮三分足冷加附子三分汗多加麻黃根一錢浮小麥一撮渴加麥冬五味便閉加蓯蓉麻仁産後咳嗽産後旬日內外感冒風寒咳嗽鼻塞聲重惡寒併兼身熱頭疼宜服加參寧肺湯毋用麻黃以發汗或喘而脅痛毋用小柴胡以散邪或患火嗽有聲痰少面赤亦毋用涼藥以清火惟有調理氣血為主若半月干嗽有聲而痰少者可用加味四物湯治之加參寧肺湯川芎一錢當歸三錢人參二錢杏仁十粒桔梗四分橘紅四分款冬一錢桑皮七分半夏八分知母一錢如虛人痰盛加竹油一小盞薑汁三匙甘草四分加味四物湯川芎蔞仁知母柯皮各一錢當歸熟地各二錢桔梗兜鈴各四分款冬六分水煎服薛立齊參蘇飲人參三分蘇木一分水煎此治産後瘀血入肺咳嗽喘急産後譫語産後妄言妄見由氣血兩虛而神魂無所依也輕則睡中呢喃重則不睡妄言或因痰客上焦十二官各失其職視聽言動皆有虛妄毋認鬼邪治法當論産期新久塊痛有無以為緩急如塊痛者宜服寧神生化湯塊痛已除宜服益榮安神湯寧神生化湯川芎二錢當歸四錢茯苓棗仁柏仁各一錢桃仁十粒炮姜炙草各五分紅棗二枚去皮水煎服虛加人參益榮安神湯川芎一錢當歸三錢茯神棗仁柏仁各一錢橘紅甘草各五分人參一錢龍眼肉八個竹肉一丸大棗二枚渴加麥冬五味汗多加參耆麻黃根痰加竹瀝薑汁瀉加茯苓白朮便閉加蓯蓉麻仁産後怔悸驚忡産後憂驚勞倦去血過多心中煩動不寧謂之怔忡如惕然而驚心中怯怯若人捕之之狀謂之驚悸二症當調和脾胃補養心血使氣寧神足氣舒心安以加減養榮湯其病自愈加減養榮湯川芎八分當歸二錢棗仁茯苓人參麥冬遠志白朮黃耆各一錢陳皮炙草各五分龍眼肉八個姜二片水煎虛煩加竹茹痰加竹瀝薑汁此方可加丹參柏仁安神丸黃連生地酒乳九蒸九曬當歸各二錢炙草八分作餅為丸如豆大硃砂為衣每服四十丸此與前藥並服産後忿怒産後因忿怒氣逆不舒胸膈滿悶血塊大痛宜生化湯磨木香三分沖服則氣舒怒散而塊自行矣若偏用香砂枳實烏藥之類以散氣行塊則反使元氣耗損而滿悶愈增如怒後即食胃虛傷滯當審所傷何物如傷肉加砂仁山楂傷米食加神麯麥芽傷冷物作痛留滯脅腹加肉桂吳萸以逐寒定痛慎勿服檳榔丸疏氣以消食健脾化氣飲人參白朮當歸各二錢川芎一錢薑炭炙草各四分水煎如塊痛未除仍用生化湯磨木香三分方內再加肉桂心八分更佳以桂能平肝而利氣也産後傷食産後形體勞倦脾氣受傷不宜多食厚味食之胃雖少納脾轉運滯以致痞塞噯酸治當溫補氣血健脾助胃養正兼消並審所傷何物佐以消導斯脾氣復而運轉如常滯物行而胃始納穀矣若消導過多必致絶谷難治急以長生活命飲救之加味生化湯川芎一錢當歸二錢山藥一錢炮姜炙草各五分完穀不化加煨肉果一個塊痛加桃仁痛止加白朮虛加人參所傷何物治法如前身熱禁用寒涼藥痞滿禁用耗氣藥長生活命飲人參二錢水二盅煎八分入鍋焦末服之如貧不能服參單用鍋焦研末沖糊服之或以白朮煎湯調服也可望其開胃産後泄瀉産後泄瀉大率虛弱食積土虛不能勝濕而然但惡露未除脾胃又弱難於消燥而用補也治法先服生化一煎後即加茯苓一錢以利小便俟血生化然後議補議消議燥使無滯澀虛滑之失若産畢即瀉者宜加減生化湯若胎前久瀉産後不止者宜參苓生化湯從權以防虛脫若久瀉不止或脾瀉者須服參朮蓮子飲百劑甚至形脫眼昏花者服丹溪急救方加減生化湯川芎一錢當歸一錢五分黑姜炙草各五分桃仁十粒茯苓一錢五分蓮肉訶子各八分姜一片水煎二帖瀉不止加人參三錢參苓生化湯川芎一錢當歸二錢土炒薑炭炙草各五分茯苓一錢五分陳皮一錢白朮一錢五分人參二錢肉果煨訶子各一錢蓮子八分糯米一撮水煎寒痛瀉加砂仁五分熱泄加炒連三分瀉久加升麻三分瀉水加蒼朮一錢瀉出食肉如敗卵及噫氣加神麯砂仁各八分山楂麥芽各五分或加豆蔻丁香各一錢渴加麥冬一錢五味六分參朮蓮子飲人參焦術各二錢茯苓一錢當歸一錢五分炒芍八分炙草五分陳皮升麻各三分山藥一錢蓮子十粒姜一片如腹痛加炮姜五分丹溪救急方人參五錢白朮三錢茯苓三錢制附一錢水煎服以上各方可加五味子酒炒二十粒乾麵粉炒黃二錢虛脫者暫加枯礬少許以澀之産後痢症産後七日內外患赤白痢疾後重頻數最為難治欲調氣血而推蕩邪穢又慮産後元虛欲滋榮養氣而大補脾腎又恐補住瘀邪惟生化湯減黑姜而代以茯苓朮香則善消惡露兼行痢疾並行而不悖也再服加味香連丸以俟一二日後病勢稍減可保無虞若七日外患褐色後重虛痢則當加補無疑其産母稟厚産期已過二十日可於生化湯加芩連芍藥枳殼及加味香連之類承氣等藥斷不可用如産母虛弱雖及月餘行積峻劑切不宜用若産後陰虛血痢日久愈甚當用四物湯加人參矣加減生化湯川芎二錢當歸四錢桃仁十粒茯苓一錢五分陳皮五分木香二分紅痢腹痛加砂仁二分煎八分送香連丸三十粒加味香連丸即香連丸加蓮肉粉一半為丸加連生化湯川芎一錢五分當歸三錢白芍一錢炒川連六分薑汁炒枳殼五分茯苓一錢甘草四分木香三分水煎服重者加山楂一錢按産後痢症不一總以人參為主歸芍次之兼有瘀未淨者則間以肉桂黃連湯重用人參自效蓋桂能去瘀也如資稟薄痢症輕者一日六七次兼有糞色亦能飲食重者空痛一日夜數十次不思飲食睡臥不寧非人參不能救也申論瀉痢十方産後瀉痢氣血暴虛必用生化湯加減然致病之由雖系濕熱多因飲食傷脾而起故重申余意另立十方於後一産後瀉黃色乃脾土真氣虛也宜補中益氣湯加木香四分煨肉果一枚炮姜四分二産後久瀉不止元氣下陷大便不禁肛門如脫宜服六君子湯加木香四分煨肉果一枚炮姜四分加升麻五分三産後傷麵食宜六君子湯加麥芽傷穀食六君子湯加神麯四産後傷肉食六君子湯加山楂砂仁各五分神麯一錢五分五産後胃氣虛弱瀉痢完穀不化六君子湯加木香三分肉果一枚六産後瀉痢脾虛四肢浮腫補中益氣加五皮散或六君子湯加五皮散七産後諸症兼嘔者俱宜加藿香一錢痰多加半夏八分八産後以前諸症兼小便短澀者加茯苓一錢澤瀉五分燈心二十根或加淨車前一錢九産後泄瀉不止加蓮子十粒石榴皮一錢十産後患赤痢久而不止用人參二錢香連丸二錢同服即愈毋多用木香薑汁之類蓋熱則血愈行也方內可加地榆以上十方須問塊痛已除方可服之産後嘔逆人之胃腑為五穀之海水穀之精上輸肝肺分布五臟化為氣血榮潤百骸産後勞傷脾胃正氣虧折邪氣易乘如入於腸胃則氣逆嘔吐而食不下矣若七日內嘔吐不止全不納穀血塊未除治當消塊佐以溫藥宜服安胃行血湯若痛已除而嘔不止不納穀者宜服加減六物湯及後溫胃和中飲若嘔而氣血不足食物不能如常宜服補中和胃湯安胃行血湯芎藭一錢當歸四錢人參一錢桃仁十粒薑炭炙草各五分藿香砂仁各四分姜三片有汗勿用加減六物湯川芎一錢當歸一錢山藥一錢五分人參一錢茯苓一錢藿香五分豆仁薑炭各四分扁豆二錢陳皮三分炙草五分姜三片嘔止去豆仁溫中和胃湯人參茯苓各一錢當歸扁豆各二錢陳皮炙草藿香丁香各三分姜三片嘔止去丁香受寒加吳茱萸補中和胃湯人參白朮扁豆當歸各二錢茯苓一錢山藥一錢五分炙草陳皮炮姜各四分水煎按嘔逆至産後症為甚急當用香砂六君子湯加制附吳萸柿蒂為引如不效加川連酒炒肉桂更不效則用二氣丹水銀三錢硫磺三錢結成砂將硫與水銀同研至無星為度米糊為丸每服二十粒遞加至四十九粒丁香柿蒂湯送下丸如梧子大可也蓋水銀得硫自化不用疑懼厄逆霍亂可用産後霍亂産後勞傷氣血臟腑虛損不能運化食物及冷風相乘以致陰陽升降不順清濁亂於腸胃冷熱不調邪正相搏上吐下瀉名曰霍亂若塊痛未除宜生化六和湯塊痛已止宜藿香溫胃散生化六和湯川芎二錢當歸四錢黑姜炙草陳皮各四分砂仁六分茯苓一錢姜一片水煎藿香溫胃散當歸白朮各三錢薑炭藿香陳皮各四分厚朴八分人參一錢炙草三分姜一片水煎若手足冷逆加附子三分産後膨脹胎前素弱産後又虧胃難納穀脾不健運或因傷食而停滯或因血虛而便閉誤進消耗等藥胃氣益損滿悶益增氣不升降滋熱助積鬱積之久遂成膨脹治當審其誤用何物如誤用耗氣藥宜益氣湯誤用消導藥宜健脾湯誤用攻下藥宜養生化滯湯益氣湯人參白朮當歸各三錢川芎白芍各八分茯苓一錢五分陳皮厚朴各四分蘇梗炙草各五分腹皮六分木香二分磨蘿蔔子三分木通五分健脾湯人參白朮當歸茯苓白芍神麯各一錢川芎七分陳皮四分炙草砂仁各五分腹皮五分傷食加麥芽五分傷冷物腹大痛加吳茱萸一錢養生化滯湯川芎二錢當歸四錢人參一錢五分脹甚者減半白芍茯苓各一錢白朮二錢脹甚倍用桃仁十粒腹皮四分蓯蓉酒洗一錢五分如塊痛即將本湯送三消丸一錢方附後病劇者須服至數十帖按産後脹症最為難治如服前方不效非大劑金匱腎氣湯不能去其病若慮方內熟地之滯則用薑汁砂仁拌炒桂附更當重用再加川椒目蒲種殼冬瓜子以利水化氣或加浮萍為引以開鬼門多服益善俟脹消後則用六君子八珍等湯調理可以復原去根此經驗已多故附增之産後口渴兼小便不利凡産後口燥咽乾而渴兼小便不利由血枯而多汗且勞倦傷脾不能為胃行其津液則生化之氣不運滲泄之令不行是以上無津液流通而有咽乾燥渴之症下則膀胱閉滯而有水道不通之候治當助脾益肺升降氣血則氣血流行陽升陰降自然津生而便利矣若認口渴為火盛而用芩連知柏以降之便澀為水滯而用五苓等味以通之非徒無益而反害之按小便由於氣化書曰氣化則能出矣故補氣生津實至言也膀胱藏津液之所真陽不足元氣不升則不出矣是補氣填精為上助脾益肺湯黃耆一錢五分人參麥冬各二錢五味十粒當歸二錢茯苓一錢五分乾葛一錢升麻四分炙草四分汗多加棗仁二錢麻黃根一錢渴甚生脈散代茶大便不通加蓯蓉二錢如産母壯盛而熱劇小便不利者暫加知母滑石各一錢産後便數淋症凡産後小便數者由腹內宿有冷氣因虛而發宜桑螵蛸散或以益智仁炒研為末米飲送下二錢若淋瀝作痛亦由産母虛弱冷氣客於腹中以茅根湯治之桑螵蛸散螵蛸二十枚人參三兩黃耆三兩鹿茸牡蠣赤石脂各二兩共為末每服米飲湯空心下白茅根湯白茅根瞿麥茯苓車前人參滑石通草麥冬炙草錢分酌用加燈心數根煎服按內府祕方用陳米淘濃泔澄清熱服之小便即通按治血淋可加淮牛膝産後傷脬小便淋數不止産後傷脬此緣穩婆之故以白芨散治之白芨散白芨鳳凰衣桑螵蛸等分入豬脬內煮爛食之産後水腫産後四肢浮腫皮膚光瑩脾虛不能制水腎虛不能行水故也當大補氣血為主佐以蒼朮白朮茯苓等藥虛加人參木通熱加麥冬條芩若因風冷濕氣傷表無汗而腫宜五皮散加姜皮半夏蘇葉以微表之使水氣從皮毛而出然後以補劑調理利水益氣湯人參白朮各三錢白芍茯苓各一錢陳皮六分木瓜八分蒼朮厚朴蘇葉木通腹皮各一錢五加皮散加皮腹皮茯皮骨皮姜皮各等分産後熱蒸成癆瘵症産後癆瘵症皆由嗜欲無節起居不時以致真陰耗竭虛火上炎或蒸而熱或往來寒熱似瘧非瘧或咳血咯血自汗盜汗或心神恍惚夢與鬼交或經水閉塞日漸羸瘦皆緣陰虛生內熱所致熱鬱積久變成虛怯宜清熱止嗽潤肺瀉火滋補真陰以復其元患此者必須寡欲內養方能有效否則不治保真湯川芎一錢當歸生地白芍各二錢麥冬一錢天冬一錢五分川貝茯苓各五分桔梗八分五味十粒骨皮一錢炙草四分棗二枚水煎虛加人參一錢黃耆六分胃弱加茯苓山藥各二錢砂仁三粒加味大造丸紫河車一具生地一兩人參當歸山藥杞子各一兩知母一錢五分石斛酒蒸麥冬各八錢銀胡六錢龜板五錢共為末煉為丸如梧子大早晚服以上二方但舉其概至辨症施治全在臨時取裁如補中益氣六味腎氣丸八珍湯十全大補湯還少丹逍遙散加芎歸此數方俱可治癆瘵因症選用可也按産後氣血已虧陰陽兩竭應得大溫大補助真陽以生真陰引火歸原法當用真阿膠上肉桂為主將虛火假熱下降丹田加以茯朮參耆健脾補氣略以龜膠石斛炒熟地沙苑蒺藜補陰以佐助之服至四五劑必見效矣切不可用滋陰清肺等藥以重危之也俟其胃開脾運火降陽回然後再於溫補之中加入治嗽等味自可活人如服清涼藥過多必至真陽上越如症現兩顴紫紅氣虛上喘眼白淡紅須用制附遲則陽脫矣産後心腹痛産後心痛即胃脘痛以胃脘在心之下因傷寒氣及冷物故作痛用生化湯佐以散寒消食之品無有不安若腹內痛必血塊未除只服生化湯佐以益母丸鹿角炭治之則瘀消而痛止若風冷乘虛入腹伴痛亦宜加味生化湯以方內有肉桂吳萸可以溫散之也若真心痛則指甲青黑或手足冷過腕節朝發夕死無藥可治加味生化湯川芎二錢當歸四錢炮姜炙草各五分桃仁十粒痛止去之肉桂八分吳萸七分姜三片水煎服傷米食加神麯麥芽各一錢傷肉食加砂仁七分山楂肉五枚按産後胃氣痛必其人素有舊病産後氣血大虧自然加甚但症有九種當辨氣血寒食蟲痰積虛實治宜加味理中湯為主加味理中湯淡附子二錢乾薑一錢茯苓一錢人參不拘炙草七分焦術二錢白蔻二分肉桂心一錢延胡索醋炒一錢五分乳香去淨油一錢五分氣痛加廣木香一錢鬱金酒炒一錢良薑醋炒一錢紫丁香十隻血痛加五靈脂醋炒一錢五分炮薑炭七分代去乾薑蒲黃炒七分歸身酒炒二錢寒痛加吳萸一錢小茴鹽水炒一錢五分蘆鹽水炒二錢重用桂附食痛加焦神麯一錢五分山楂砂糖炒二錢雞肫皮焙乾二錢廣皮一錢母丁香七分蟲痛加川椒四十粒烏梅二個吳茱萸川連一錢煮汁伴炒八分棐子肉三錢痰痛加法夏二錢草果煨一錢沉香一錢牡蠣粉二錢化橘紅一錢積痛脾之積為痞氣加母丁香八分陳香團二錢佛手柑一錢巴豆去油淨取霜焙乾三分再用濕腐乳皮包好藥汁送但此味巴豆霜必積痞現而不化甚急它藥不效始不得已用之宜慎虛痛分陰陽陰虛加熟地薑汁益智砂仁共十五粒炒焦五錢枸杞子酒炒阿膠蒲黃炒二錢淨萸肉酒炒二錢乾薑代炮姜五分陽虛仍用原方增附子實痛去人參焦術加枳殼一錢草蔻一錢肉桂代桂枝八分醋炒甚者加韭汁製大黃三錢用韭汁拌大黃九蒸九曬用以上各症加減必須認明證候施治為要産後遍身疼痛及腰小腹痛産後遍身痛由産時百節開張血脈凝滯纍日不散則經脈經絡不舒故腰背不能轉側手足不能動履或兼身熱頭疼若誤認太陽表邪而發散出汗則手足逆冷變成險症矣宜祛痛散治之婦人腎位系胞腰為腎府至産勞傷腎氣損動胞絡或産未平復而風寒乘之二者皆致腰痛宜養榮壯腎湯或加味大造丸若小腹作痛未曾服生化湯問惡露如何若可按揉而稍止者屬虛並宜加味生化湯治之祛痛散當歸二錢人參白朮各一錢黃耆川膝獨活各八分肉桂五分韭白一撮生薑一片水煎養榮壯腎湯當歸二錢防風四分獨活桂心川芎杜仲寄生川斷各八分生薑三片水煎加味生化湯川芎一錢當歸三錢桃仁十粒炮姜炙草各四分肉桂五分元胡五分後二味痛止減去若臍下無血塊而仍痛不止者加熟地三錢産後乳疽乳癰産後乳生癰疽初發時寒熱往來如瘧不可作瘧治亦不可全用敗毒消疽等味當大補氣血佐以金銀花等味以散邪毒若膿未成痛不可忍宜栝蔞乳沒散已成膿宜敗毒大補湯外用馬蹄香搗爛敷之若膿已出而虛弱日甚者宜服十全大補湯栝蔞乳香散栝蔞一個連皮子搗爛當歸銀花各三錢白芷一錢青皮五分乳香五分沒藥五分甘草四分公英五錢水煎加酒溫服排膿大補湯人參白朮生地銀花各二錢當歸三錢茯苓一錢連翹五分黃耆一錢青皮三分烏梅一枚元棗一枚此方可加白芷八分以能排膿內托也加減十全大補湯人參白朮當歸生地黃耆各二錢茯苓川芎各八分甘草五分遠志一錢淨銀花三錢水煎瀉加蓮子十四粒肉果一枚渴加麥冬五味久不收口加參末膏藥貼之按乳疽乳癰總以十全大補湯為主或加銀花公英復以遠志肉煎燒酒時時服之自效十全大補湯即四君四物加桂耆也産後流注産後惡露流注於腎腰關節之處或漫腫或結塊作痛久則腫起肢體倦怠急用蔥尉法以散外腫內服參歸生化湯以散血滯至已潰未潰其法參之乳癰症中蔥尉法用生蔥一握搗作餅貼患處加厚布三四層以火斗尉之立效此方可治癰疽初起參歸生化湯黃耆川芎各一錢五分當歸三錢人參二錢肉桂八分甘草五分馬蹄香二錢附乳疽方採鮮蒲公英一握連根搗汁酒沖服以渣貼患處即愈按醫流注法以五香散米湯和成餅再用大蒜糊薄鋪初起之處上以五香餅放好用艾灸在餅上其痛者灸至不痛發癢方止癢者灸至痛方止如不痛不癢灸至皮肉融活為度多灸為貴毒自散矣五香散丁香木香沉香肉桂麝香等分射一半為末再加白芷蘇葉薑黃血竭同和餅灸陰毒腫痛風毒亦可陰門腫痛臨産用力過傷以致陰門兩旁腫痛手足不能舒展者用四季蔥入乳香末搗成餅貼腫痛處良久即愈陰門突出臨産用力逼送陰門突出者四物湯加龍骨少許連進二服外用如聖膏貼頂少收即拭去産後陰門發癢按陰門發癢者乃産後脾胃不調氣血不和宗氣下陷濕熱下逼陰中因而生蟲其癢者乃蟲食陰戶也治宜補中益氣湯去柴胡加減用之外用薰洗貼法加減補益湯黃耆一錢五分人參一錢五分歸身一錢炙草五分焦術一錢陳皮五分升麻三分川椒二十粒烏梅二個吳萸三分川連三分均炒薑棗引煎服外治法用蛇床子一兩川椒三錢蔥白五個苦參五錢艾三錢煎湯向陰中先薰後洗如薰洗數次不愈用豬肝切大片香油搽過放新瓦片上炙將熟氣香時乘熱即貼陰門癢處冷熱三次豬精肉亦可用先洗後貼豬精肉亦用香油搽炙又用嫩雞一隻剖開煮熟用滾米醋烹貼癢處産後陰門生瘡按陰門生瘡亦下陷濕熱所致服加味補益敗毒散加味補益敗毒散生耆二錢人參二錢焦術一錢炙草八分陳皮一錢歸身二錢升麻五分荊芥一錢淨銀二錢肉桂五分防風一錢乳香去油一錢煎服外治法生甘銀花元參土茯苓蒼朮白芷茶桑葉苦參蔥白蒜梗等分煎薰洗加槐枝川椒更好摻藥方三仙丹底一錢黃連一錢大黃一錢象貝二錢輕粉五分無名異一錢冰片一分升過樟腦五分制過甘石一錢黃柏二錢共為細末摻瘡如干用豬膽汁和麻油調搽升樟腦法用樟片一兩薄荷葉一兩好瓷碗一個將薄荷鋪好將樟片放在薄荷上再用好瓷碗蓋之濕紙重封口勿令泄氣用火盆緩火上燉三株線香為度取出蓋碗上面結住者即樟霜也升三仙丹法水銀一兩輕粉研一兩火硝研一兩用大傾銀罐一個將三味放罐內上用小罐蓋好鹽泥封固勿泄炭火煅至三株香為度取出冷定小罐蓋上者為丹頭大罐底下者為丹底拔毒用丹底收口用丹頭凡各瘡毒摻藥俱奇效一方硝代白礬用小鍋一隻蓋以瓷碗亦可升乳汁不通産後乳汁不通其故有二一由氣血兩虛乳來稀少一由氣閉血滯壅塞不行蓋婦人多憂思忿怒憂思則氣結而血亦結忿怒則氣逆而血亦逆甚至乳硬管塞脅痛煩熱故方於通乳藥中多用香附木香青皮者以行氣故也用王不留行者通乳而兼行血也若惟由氣血虛弱則不必用利氣藥等味須服豬蹄湯或鍾乳飲豬蹄湯豬蹄一隻通草五錢煮汁服之鍾乳飲鍾乳粉二錢漏蘆三錢煎汁服一方鯽魚木通煮汁食之按乳汁不通皆由氣血不足之故用豬蹄一隻有七星者佳煮濃汁入當歸五錢熟地六錢人參一錢西黨參八錢代之亦可川芎一錢五分通草一錢杞子三錢炙耆三錢煎服如人壯氣閉則加王不留行一錢不可多用消乳産母無子飲乳有乳而欲清者用麥芽二兩炒為末四物湯調服即消又方用神麯二錢炒為末酒吞日服一次
