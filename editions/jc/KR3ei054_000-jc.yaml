front:
  text: 原序症之至危而治之甚難者莫如胎產未產而保衛之既產而調護之此其道失之毫釐謬以千里者也吾鄉山陰錢氏及蕭山竹林寺僧獨擅其道以行於世遠近就醫如市賴以生活者不可勝計第其方書秘而不露無能窺其奧咸為悵然既今之達生篇雖善但何症應作何治尚未詳備余自成童即留心胎產前於受業師陳勿庵先生家得珍藏秘本細加披閱內分胎前臨產產後三門復附保嬰要訣其別類也詳其論症也確其立方也精較之達生篇更為盡善而盡美此治產之寶鑑濟世之良書也然後知錢氏及竹林寺僧擅醫獨步者其方書均出於此矣誠使是書家置一本臨時翻閱驗證引方則安者不至於危危者可轉為安具有益於人世豈曰小補之哉是書余於乾隆乙卯遊幕楚南與陳百樓先生同館岳陽郡署已付剞劂公之於世旋赴粵西又之黔之滇所鐫刻本出以與人依方治病無不神效然藏板星沙終以不得遍行海內為未愜於心茲遊皖江復遇好善樂施諸公因而重鐫以廣流傳夫利一身者一身行之利天下者當與天下共之是書他日自邇迄遠轉相鐫刻俾得人人而濟之尤余之所厚望也夫時嘉慶十四年歲次己巳七月既望古虞杏園何榮撰
