body:
  text: 上卷胎前總論凡孕婦脾胃健旺氣血充足則胎安產順毋庸用藥調理惟稟不足而氣血衰脾胃弱而勞役過以致諸症百出不得不資藥力矣昔丹溪定補母安胎之方以補氣血為主以順氣清涼為佐參朮黃芩為安胎之聖藥芎歸熟地為補血之妙劑加以蘇陳等味定為常服主方至胎成六月茯苓性降不宜多用黃耆肥胎不可常加香附雖快氣疏肝過則耗氣無補砂仁能止嘔定痛多亦動血行胎此誠先賢之法戒後學之準繩也而猶以為未備因分析胎前諸症擬成數十餘方以便臨期酌用惡阻凡妊娠一二月惡阻嘔逆煩悶嗜臥即俗所謂病兒也此由婦人本元虛弱平時喜怒不節寒暑不調中脘宿有停痰積飲受孕經閉飲食相搏氣不宣通以致心下煩悶頭眩眼花四肢倦怠聞食即嘔喜酸嗜鮮多臥少起甚至嘔逆不食法當順氣理血豁痰導水而諸症自除以加味參橘飲治之加味參橘飲人參一錢白朮二錢砂仁三分厚朴一錢橘紅四分當歸一錢香附五分甘草三分姜三片竹茹一丸若無力服參去之亦可或方內加半夏曲八分胎動不安凡妊娠二三月胎動不安者蓋因子宮久虛氣血兩弱不能攝元養胎致令不安欲墮急服安胎飲以保之若先經墮過者可先服大造丸繼服杜仲丸庶無半產之患湯氏云半產多在三五七個月如前次在幾個月墮者後必如期復然故當追算前在三個月墮者即於未墮半月前先服清熱養血固胎之藥數帖以補其虛五月七月墮者亦於未墮半月前預先服藥方保平安此據受孕後夾熱者而言蓋三五七系陽月緣火能銷鑠故也安胎飲人參一錢虛者倍用當歸二錢熟地三錢條芩一錢川芎七分白朮二錢陳皮四分紫蘇四分甘草四分元棗二枚如虛肥人陳皮去白加川連五分如脾胃溏瀉加蓮子十粒砂仁五分川連五分炒去熟地黃芩怒而多瀉加木香三分渴加麥冬二錢怔忡驚悸加棗仁二錢益智仁一錢龍眼肉十個大造丸紫河車一具泔水洗淨炙酥杞子一兩人參一兩五錢當歸二兩麥冬一兩三錢天冬一兩益智一兩茯苓二兩五味五錢熟地姜炒二兩川膝五錢山藥八錢菟絲子鹽水炒四兩川柏鹽水炒一兩共為末蜜煉丸如桐子大白滾湯送下五十丸杜仲丸杜仲薑汁炒川斷酒浸各等分為末煉蜜為丸如桐子大米飲湯送下五六十丸又方杜仲三錢川斷三錢水煎服名為泰山盤石飲胎動腹痛凡妊娠胎動腹痛者或因飲食冷熱及動風毒物或因交感搖動骨節傷犯胞胎或因服藥太過血氣不調所致宜服順氣補血之藥如加味安胎飲或如聖散加味安胎飲砂仁炒麥冬條芩各一錢人參當歸熟地各二錢陳皮紫蘇各四分生白朮一錢五分甘草三分大棗二枚生薑三片水煎服此方凡妊娠元氣不足精神倦怠胎動不安或身上微熱者並宜服之必一日兩服方可平安如腹痛者去麥冬加蘄艾醋炒黑七分或再加四制香附一錢蓋氣通則不痛也如咽燥多痰兼失血者加川貝一錢五分黑荊芥一錢如聖散鯉魚皮阿膠當歸川斷各二錢熟地三錢白芍一錢川芎一錢甘草六分加苧麻根少許生薑五片水煎空心服胎漏下血凡妊娠胎漏經血妄行此是胎息未實或因勞役過度傷動胞胎或因房室驚觸致令子宮虛滑經血淋漓若不急治日漸胎干子母不保急服寄生散或參歸飲或阿膠濟陰湯或保產無憂散寄生散寄生川斷阿膠香附黑人參白朮川芎各等分加姜五片水煎服參歸飲人參當歸寄生淮生淮熟條芩香附茯苓阿膠各一錢川芎五分生甘草五分白芍二分黃耆一錢半黃楊葉三片生薑二片水煎服甚者日進一劑阿膠濟陰湯阿膠白朮各一錢地黃白芍當歸川芎各一錢砂仁帶殼五分條芩蘄艾各錢半香附八分炙甘草五分黏米一撮水二湯碗煎至一碗溫服如下血塊加地榆腰痛加杜仲觸患胞胎加金銀花須一日一夜三服以防敗血攻心如血不止加川斷二錢炒黑荊芥一錢五分黑大豆四十九粒如因傷瘀而痛怕按者加桂心三四分保產無憂散生綿耆二錢半歸身一錢酒炒川芎一錢甘草一分菟絲餅二錢羌活七分厚朴七分薑汁炒枳殼六分麵炒蘄艾七分醋炒荊芥穗一錢川貝一錢白芍酒炒冬月八分夏月一錢日進二劑亦可此方兼可催生如不見血加生薑二片漏胎凡受孕之後經血不時點滴謂之漏胎蓋由勞傷氣血虛弱之故或因惱怒或食炙煿熱物所致宜補中安胎飲補中安胎飲條芩白朮人參各三錢熟地三錢當歸錢半白芍一錢生甘草五分蘇梗八分跌撲動胎凡妊娠跌撲動胎下血不止急服安胎參蘇飲安胎參蘇飲人參蘄艾川芎各三分當歸一錢條芩生術各二錢陳皮紫蘇生甘草各四分阿膠一錢有外感者加蔥白四寸腹痛減蘄艾加砂仁四分小便帶血凡妊娠小便中帶血由形體勞苦或過食煿炙之物所致宜清膀胱之火服加味逍遙散加味逍遙散當歸白朮各二錢柴胡白芍各一錢丹皮茯苓梔子各七分生甘草八分燈心七莖子淋凡妊娠小便淋漓此由調攝失宜酒色過度傷損營衛致令子宮氣虛而然又或下焦有熱而閉塞者名曰子淋宜服安榮散安榮散當歸五錢滑石一兩通草一兩人參三錢麥冬一兩細辛一錢炙甘草燈心各五錢共為末每服四錢白湯送下又方用桑螵蛸為末每服二錢空心米湯送下又方用陳米陶濃汁服之此方並可治男子癃閉按此症由飲食無忌熱積膀胱者居多湯氏用古芎歸湯加木通麥冬人參燈心甘草滑石治之如清涼通利等藥不效即用補中益氣湯加淨車前二錢蓋中氣一提則下竅自開況車前利水通淋一提一降自然見效補中益氣湯見子滿條下子腫凡妊娠面目虛浮四肢有水氣名曰子腫蓋由脾胃虛弱所致宜服全生白朮散或鯉魚湯全生白朮散人參一錢白朮二錢茯苓皮八分甘草三分當歸二錢川芎六分紫蘇陳皮各四分生薑三片水煎服或加蒲種殼二錢或干浮萍一錢生薑用皮並加冬瓜子三錢鯉魚湯鯉魚不拘大小二三尾洗去鱗用水煮熟去魚每服用湯一大盅煎後藥服之當歸白朮各五錢茯苓四錢陳皮二錢每服四錢加生薑七片投魚湯內煎服以愈為度湯氏云子腫於五六個月時多有之或腹大高過心胸氣逆不安此由胎中蓄水所致若不早治必然生子殘疾子母難保常煎鯉魚粥食之子滿凡妊娠腿膝浮腫腳面足趾水出氣促滿悶此由脾虛血化成水所致名曰子滿又名子氣宜服加味天仙藤散如脾氣弱甚者宜服補中益氣湯加味天仙藤散天仙藤洗略炒六分木瓜一錢香附六分紫蘇陳皮各四分烏藥七分甘草三分水煎服虛甚加人參一錢當歸白朮各二錢補中益氣湯人參炙耆各錢半炙草五分白朮歸身各一錢陳皮七分柴胡升麻各三分或加川椒目一錢淨車前一錢更佳水煎服按妊娠七八個月兩足浮腫乃胞漿水濕下流之故其微腫者名曰皺腳得之易產其腫甚或出黃水者始服補中益氣湯子懸凡妊娠胎氣不和上湊心腹滿痛難忍謂之子懸以紫蘇散治之紫蘇散紫蘇陳皮白朮腹皮當歸川芎各等分人參甘草各減半姜五片蔥白五寸水煎空心服一方以蓮房燒灰酒送下安胎順氣飲即前方去腹皮加砂仁三粒木香三分磨汁加姜煎按受孕至三五個月斯時相火養胎火盛胎熱則氣逆湊心多有此症子煩凡妊娠心驚膽怯煩悶不安名曰子煩宜服竹葉安胎飲竹葉安胎飲人參三分白朮條苓當歸各二錢棗仁遠志各八分陳皮三分川芎七分生甘草四分生地錢半麥冬一錢竹葉十片薑棗引有痰加竹瀝薑汁虛甚人參倍用瀉加芡實減生地按此症亦多在四五個月之時相火用事或因夏令君火大行俱能乘肺以致煩躁湯建中雲因相火者加知母因君火者加川連子嗽凡妊娠子嗽因外感傷寒者參蘇飲去人參半夏加桑皮杏仁因火乘肺金者二陳湯去半夏加芩連枳桔貝母痰而喘者加蔞仁前胡桑皮如咳嗽吐血不止者用生地飲如風壅相攻胸滿久嗽者用百合散加減參蘇飲蘇葉杏仁橘紅各一錢枳殼炒七分前胡八分木香三分桔梗乾葛各七分桑皮七分甘草四分水煎服喘加蔞仁二錢加減二陳湯枯芩二錢川連橘紅川貝茯苓桑皮各一錢前胡七分枳殼八分甘草五分栝蔞一錢生地飲生地三錢犀角三分白芍知母天冬麥冬各二錢黃芩八分桔梗八分當歸二錢紫苑一錢五分甘草四分喘加栝蔞一錢百合散百合二錢桑皮七分前胡八分桔梗七分芍藥一錢赤苓八分貝母一錢橘紅一錢甘草五分生薑引水煎服或加紫苑款冬子瘧凡妊娠病瘧多由營衛虛弱脾胃不足或感風寒或傷生冷傳為瘧疾名曰子瘧宜服驅邪散熱多寒少者清脾飲去半夏寒多熱少者人參養胃湯去半夏久而虛者四獸飲主之驅邪散藿香白朮茯苓各等錢甘草肉果少許知母一錢橘紅八分砂仁八分薑棗引如有表邪者加蘇葉八分蔥白五寸或加柴胡八分清脾飲白朮茯苓知母各一錢青皮四分厚朴八分黃芩二錢甘草五分生薑為引水煎服原方有柴胡人參養胃湯人參蒼朮藿香厚朴各一錢陳皮一錢五分肉果六分茯苓一錢二分炙甘草五分姜引或加烏梅一個四獸飲人參二錢白朮土炒二錢茯苓一錢二分炙甘草五分陳皮一錢二分肉果八分元棗三枚姜二片烏梅三個或加當歸二錢虎骨膠二錢如無膠用虎骨六錢以上各方虎骨當歸均可加入子癇音閒即胎風一名兒暈又名痙凡妊娠口噤項強手足攣搐言語蹇澀痰涎壅盛不省人事名曰子癇切不可作中風治宜服加味羚羊角散或加味地黃湯如無痰涎言語如常但見中風形狀此緣血少類風如以風藥投之貽害不淺加味羚羊角散羚羊角當歸防風獨活茯苓棗仁五加皮各一錢米仁五分杏仁八分甘草木香各三分蔥白五寸姜五片煎服虛加人參痰加竹瀝薑汁脾虛加炒白朮風痰湧甚加天竺黃一錢川貝一錢加味地黃湯大熟地薑汁砂仁拌炒八錢淨萸肉四錢懷山藥四錢茯苓三錢丹皮三錢澤瀉二錢陳膽星二錢吳茱萸五分川連五分煮汁泡七次炒一錢荊瀝沖服子喑音因凡妊娠三五個月忽失音不語者胞絡脈絕也名曰子喑蓋胞系於腎腎脈貫舌故失音此非藥可治分娩即自出聲湯建中雲前症俱由妊娠脾土不運而生濕濕生痰痰生熱熱生風如子腫濕也惡阻痰也子煩子淋熱也子癇風也子懸氣也轉脬虛也治法雖有清熱消痰滲濕順氣疏風補之不同要不外去邪保胎四字為總訣也外感風寒凡妊娠外感風寒渾身壯熱眼花頭眩此因風寒客於肌表侵人脾胃傷損營衛是以憎寒發熱頭疼眼痛甚至心腹煩悶不可妄投峻劑只宜芎蘇散表其寒邪按婦人天癸未行屬少陰天癸已行屬厥陰天癸已絕屬太陰胎產之病治厥陰者溯化之源也故機要曰胎產病當從厥陰經論毋犯胃氣及上二焦謂之三禁不可汗不可下不可利小便是也汗則痞滿下則傷脾利小便則內亡津液中州枯燥故受孕三五個月時不可用一毫辛散滑利之品惟七八個月後倘有閉結乃敢稍施以滑利之劑故上云不可妄投峻劑加味芎蘇散紫蘇羌活陳皮麥冬各一錢川芎白芍各八分乾薑生甘草各五分加生薑二片水煎服胎前宜清涼乾薑還須忌用霍亂吐瀉凡妊娠霍亂吐瀉心躁腹痛宜服六和湯六和湯藿香砂仁各五分陳皮茯苓生甘草各四分人參木瓜各一錢扁豆二錢杏仁十粒夏曲六分姜三片棗二枚竹茹一丸下痢凡妊娠下痢赤白此由生冷傷脾鬱積傷胃以致濕熱相干氣血凝滯其濕熱傷於氣分則下白積傷於血分則下紅積腹鳴後重下痢頻頻急服姜連丸治之如腹中疼痛心上急滿宜當歸芍藥湯或歸芍湯更佳姜連丸川連白朮砂仁阿膠炮姜川芎各一兩枳殼五錢炒乳香三錢另研共為末加鹽楊梅三枚醋少許打糯米糊為丸如桐子大每服四十丸白痢淡薑湯下赤痢甘草湯下赤白痢甘草生薑湯下按赤痢可加銀花白痢腹痛可加青皮姜炒川連亦必不可少不必分赤屬熱白屬寒拘泥於薑湯甘草送下也當歸芍藥湯當歸白芍枳殼麵炒山楂各一錢厚朴八分棟皮六分木香三分甘草四分黃芩二錢水煎服忌生冷歸芍湯當歸三錢白芍半生半炒二錢萊菔子炒研二錢廣木香八分檳榔七分枳殼八分甘草五分淨車前一錢五分山楂砂糖炒一錢五分白痢加生薑紅痢加白糖煎服積已清而腸薄不止始用川連丸並阿膠參耆可也熱痢初起用馬齒莧一味不拘多少煎當茶服亦效其馬齒莧葉青梗紅根白花黃子黑名曰五方草又名五行草有奇功凡下痢俱可用熱症凡妊娠病熱嘔吐不食胸中煩躁宜安胎涼膈散如熱甚發赤黑斑小便如血胎漸落將危者急以梔子石膏湯救之遲則墮矣如火熱壅極心煩口渴者宜清心潤肺湯安胎涼隔飲知母麥冬人參蘆根葛根黑梔竹茹蔥白各等錢水煎服梔子石膏湯梔子黃芩生地各二錢石膏四錢青黛一錢升麻四分豆豉一錢蔥白三寸水煎服按本方治發斑可加元參連翹各二錢或去石膏加犀角一錢恐石膏重墜不化清心潤肺湯黃芩梔子麥冬各二錢知母花粉人參各一錢甘草五分犀角三分薑棗引按方內用人參恐火得補而益熾治熱之方去之為得因怒滿悶凡妊娠因多怒氣胸膈滿悶或服順氣耗氣藥太過以致滿悶益增者宜散氣消悶散治之烏藥香附枳殼砂仁等故須少用散氣消悶散人參一錢白朮二錢川芎三分木香磨汁三分蘇葉條芩甘草各三分姜三片水煎服小腹重墜作痛凡妊娠腹痛時作小腹重墜此緣氣虛下陷間有兼寒者宜加味安胎飲治之加味安胎飲白朮熟地當歸各二錢陳皮蘇梗川芎甘草各四分砂仁五分兼寒者加吳萸五分乾薑五分水煎服或去乾薑加醋炒良薑七分生綿耆一錢五分母丁香四分小腹虛脹閉滯凡妊娠小腹虛脹因食硬物傷胎胎既受病傳於脾胃胃氣虛冷下逼小腸若奔豚腰重或大便閉澀兩脅虛鳴宜服勝金散溫中下氣胎自安矣勝金散吳萸陳皮熟軍乾薑川芎各二兩厚朴砂仁甘草各三錢共為末每服二錢鹽湯送下胎冷腹痛欲瀉凡妊娠胎冷腹脹兩脅虛鳴臍下疼痛欲瀉小便頻數大便虛滑此因胎已成形而多食瓜果生冷之物或當風取涼受不時之氣致令胎冷子身不安皮毛刺痛筋骨拘緊而母有此病急宜安胎和氣散治之安胎和氣散訶子麵煨白朮各二兩當歸白芍木香各五錢良薑炒二錢炙甘草三錢生薑二片陳米一撮每服五錢忌生冷或加母丁香五分以去瓜果積胎驚心悸氣促脹痛不安凡妊娠心神怯悸睡夢多驚脅腹飽脹過時連臍急痛氣促不寧此是胎氣既成五臟安養已久或因氣悶或因喧呼致令胎驚筋骨傷痛四肢不安急以大聖散治之大聖散當歸川芎麥冬茯苓各二錢炙耆人參木香甘草各五分姜三片水煎服頭眩目暈痰壅將危凡妊娠頭眩目昏腮項腫硬此因胎氣有傷熱毒上攻太陽沉痛欲嘔背項拘急致令眼暈生花若加痰壅危在片時急以消風散治之消風散雨茶甘菊羌活石膏當歸川芎羚羊角白芷荊芥防風各等錢甘草八分姜煎食後服兩目不明腮項腫滿凡妊娠將臨月忽然兩目不明燈火不見頭痛項腫不能轉頸此由常居火閣衣襟臥褥伏熱在內或服補藥熱物太過致令胎熱而肝臟壅極風熱上攻入腦故見此症急以天冬飲子治之大忌酒蒜炙煿油膩一切辛熱發物否則眼不復明矣天冬飲子天冬荊芥各一錢五分當歸川芎熟地白芍茯苓知母各二錢人參六分五味十四粒防風茺蔚子各一錢如病退間日一劑初服每日一帖遍身刺痛喘滿筋攣凡妊娠遍身刺痛脹滿此由五臟不利血氣虛羸因食生冷或發熱憎寒唇白麵青筋脈拘攣骨節痠痛皮毛乾澀氣急上喘大便不通嘔吐頻頻此危症也急以平安散保之平安散厚朴陳皮熟地甘草川芎木香各等錢煨姜二片鹽一撮水煎服因失血類中風症凡妊娠因吐血衄血或被傷失血驀患口噤項背強直類中風症宜服加減安胎飲衄音肉刃傷也加減安胎飲人參白朮麥冬當歸熟地天麻各二錢防風荊芥各一錢陳皮甘草各五分姜三片水煎服或加川貝一錢天竺黃一錢心煩腹脹百節痠痛小便閉澀凡妊娠面赤口乾舌苦心煩腹脹百節痠痛小便不通此由恣意飲酒及食水果魚肉一切腥膻熱毒之故以歸涼節命飲治之歸涼節命飲苧根白芍當歸川芎麥冬各一錢生白朮一錢半砂仁五分甘草六分黏米一撮如中酒者加葛根一錢積食者加山楂麥芽各一錢小便閉者加赤苓腹皮各一錢蔥白引半產凡妊娠月未足而半產者由氣血虛弱臟腑皆虛加以病患相感情欲相擾以致精血攻衝侵損營衛而胎無所養與枯枝落果無異如既墮以生化湯加減治之未墮而血行腰痛急以十聖散連進數帖或芎藭補血湯十聖散人參黃耆各二錢當歸白芍川芎熟地白朮各一錢砂仁五分川斷七分甘草五分姜一片棗一枚飯後多時再服忌惱怒並食生冷一切辛熱等物或加枸杞一錢半芎藭補血湯川芎白朮阿膠白芍杜仲人參黃耆五味木香各等錢甘草八分姜一片棗二枚按此症保胎無憂散方列漏胎下連服七八劑一日兩帖更妙腹中兒啼凡妊娠臨月或九個月腹中兒啼者緣兒在母腹口含臍帶隨母呼吸妊母或將手扳高取物提出兒口臍帶故啼但令其母如男子作揖使臍帶仍入兒口即不鳴矣或煎黃連濃汁呷之轉脬凡妊娠將足月脬為胎壓轉在一邊以致臍下急痛小便不通但升舉其胎則脬仍還舊而水道自通宜六君子合四物湯去茯苓加半夏陳皮探吐以提之不宜專用滑滲之藥產後亦有此症搗蔥白鋪於臍上灸之立效六君子湯半夏薑製二錢陳皮去白一錢茯苓一錢甘草五分人參一錢白朮一錢四物湯當歸四錢酒洗生地二錢白朮錢半川芎錢半乳吹凡妊娠胎前兩乳硬腫疼痛寒熱併發者此名內吹乃督任不通經絡不和寒束毛竅氣閉血滯乳管阻塞治宜加減無憂散加減無憂散生黃耆三錢當歸二錢川芎一錢菟絲餅二錢厚朴姜炒八分枳殼麵炒一錢川羌七分荊芥穗一錢川貝一錢五分生甘草一錢遠志一錢五分蒲公英一錢五分姜三片甚者加鹿角屑五錢淨銀花一錢服後飲燒酒一杯一方單用鹿角屑四五錢燒酒煎服一方用豆腐皮一兩炙焦研末燒酒沖服一方用遠志二兩煎燒酒時時服之即將遠志渣搗爛鋪乳硬處再用蔥姜搗爛和食鹽少許鋪遠志上用艾灸七大壯重者用麻黃三錢青皮二錢炒研末燒酒調服凡產後乳吹皆可照前方用不宜服瘦胎方辯凡妊娠臨產艱難者大率由口饜甘肥身耽安逸既飽既臥遂令胞胎肥厚行動氣急以致臨盆難產宜於胎將足月之時時時動作勿嗜肥鮮勿貪坐臥勤行勤走此即不藥滑胎之妙法也乃世醫咸謂安胎之後必須更進滑胎藥始為合宜豈知滑胎名目昔人原為湖陽公主而設蓋以貴家居養豐逸身體肥盛誠恐軀脂凝結胞系堅固特藉此以稍疏其肥滯耳若平等婦人一母之氣血分蔭其胎尚虞不敷苟復加無憂易生名目一概施之是猶寠人而復遭削奪其能勝此乎然恐後人疑為未備特詳錄二方以為體肥稟厚者採擇也昔湖陽公主每產累日不下南山道人進以滑胎枳殼散用麵炒枳殼二兩炙甘二兩共為末每服二錢白滾湯送下一日三服殊效蓋為壯實者立法也無憂散當歸枳實各二錢白芍一錢二分乳香麥冬神麯各一錢陳皮八分木香五分訶肉一枚血餘一團甘草八分易產湯當歸川芎生地甘草腹皮白朮益母草各等錢胎前脈法婦人有孕陰搏陽別脈以寸為陽尺為陰尺脈搏指而動與寸脈迥然分別者此孕成之候也少陰獨動其胎已結少陰心脈也心主血今心脈往來流利而獨動乃血旺成胎之象故可知其有孕又曰動者如豆粒之逼指而動也滑疾不散胎必三月疾即數也不散者按之愈有而不散也但疾不散五月可決總之按而不散者為有力故斷之為胎亦間有損症似此者須細辨之左疾為男右疾為女女腹如箕男腹如釜又曰三部之脈浮沉正等無他病而月經不通者乃有孕也三部之脈浮沉正相等是無病之脈也又何以不月既已不月者是有病之驗也又何以無他病故脈雖不顯而受孕可知再脈沉實為男沉實為坎中滿屬真陽也虛浮為女虛浮為離中虛屬真陰也左手沉實為男右手虛浮為女兩手沉實為雙男兩手虛浮為雙女一手沉實一手虛浮不拘左右為一男一女也胎前禁藥歌芫斑水蛭及虻蟲烏頭附子與天雄野葛水銀共巴豆牛膝薏苡並蜈蚣三稜莪朮芫花麝大戟甘遂黃雌雄代赭芒硝牡丹桂槐花牽牛皂角同半夏南星及通草瞿麥乾薑桃仁通硇砂乾漆蟹甲爪地膽牙硝是禁中附增異症腹中兒啼煎川連汁呷下或青黛亦效腹中作鐘鳴或哭者用多年空房內鼠穴中土為末黃酒送下或干噙之即止有臟燥悲傷慘慼嘔下者大麥甘草大棗煎服有自哭自笑者紅棗燒存性米飲下妊娠患痘無從用安胎補劑若用攻藥必致去血泄氣立危之症也不必服藥胎形一月如露珠二月如桃花三月分男女四月形象具五月骨節成六月毛髮生七月動右手是男於母左是女於母右八月動左手是男於母右是女於母左九月三轉身十月始滿足
